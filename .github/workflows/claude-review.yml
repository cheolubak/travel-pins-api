name: "Claude Code Review"
on:
  pull_request:
    types: [ opened, reopened, synchronize ]
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            
            이 PR을 리뷰하고 코멘트로 작성해주세요.
            
            다음 사항에 중점을 두고 이 PR을 검토해 주세요.
            - 코드 품질 및 모범 사례
            - 잠재적인 버그 또는 문제
            - 보안 관련 사항
            - 성능 고려
            
            구체적인 문제에 대해서는 인라인 주석을 사용하여 자세한 피드백을 제공해주세요.
            
            리뷰 완료 후 심각한 문제가 없으면 `gh pr review ${{ github.event.pull_request.number }} --approve -b "LGTM"` 명령으로 승인해주세요.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
