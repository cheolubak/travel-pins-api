name: "Claude Code Review"
on:
  pull_request:
    types: [ opened, reopened, synchronize ]
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Resolve Fixed Review Threads
        if: github.event.action == 'synchronize'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          set +e
          echo "🔍 해결된 리뷰 스레드 검색 중..."

          OWNER=${REPO%/*}
          NAME=${REPO#*/}

          # GitHub API로 최신 push에서 변경된 파일 목록 조회
          CHANGED_FILES=$(gh api "repos/$REPO/compare/${BEFORE_SHA}...${AFTER_SHA}" \
            --jq '.files[].filename' 2>/dev/null || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "변경된 파일이 없습니다."
            exit 0
          fi

          echo "📝 변경된 파일:"
          echo "$CHANGED_FILES"
          echo ""

          # 미해결 리뷰 스레드 중 bot이 작성한 것 조회 → 변경된 파일에 해당하면 resolve
          gh api graphql -F owner="$OWNER" -F name="$NAME" -F number=$PR_NUMBER -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(last: 100) {
                    nodes {
                      id
                      isResolved
                      path
                      comments(first: 1) {
                        nodes {
                          author {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              }
            }' \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | select(.comments.nodes[0].author.login == "github-actions[bot]") | "\(.id)\t\(.path)"' \
            | while IFS=$'\t' read -r thread_id thread_path; do
                if [ -n "$thread_id" ] && echo "$CHANGED_FILES" | grep -qxF "$thread_path"; then
                  echo "✅ 스레드 resolve: $thread_path"
                  gh api graphql -f query='
                    mutation($threadId: ID!) {
                      resolveReviewThread(input: {threadId: $threadId}) {
                        thread { isResolved }
                      }
                    }' -F threadId="$thread_id" 2>/dev/null || echo "⚠️  resolve 실패 (무시)"
                  sleep 0.3
                fi
              done

          echo "✅ 해결된 스레드 resolve 완료"

      - name: Delete Previous Claude Reviews
        if: github.event.action == 'synchronize'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e  # Continue on error
          echo "🔍 이전 Claude 리뷰 검색 중..."
          # 1. PR 코멘트(요약) 삭제 - github-actions[bot]이 작성한 코멘트
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | .id' \
            | while read comment_id; do
                if [ -n "$comment_id" ]; then
                  echo "🗑️  PR 코멘트 삭제: $comment_id"
                  gh api -X DELETE "repos/$REPO/issues/comments/$comment_id" 2>/dev/null || echo "⚠️  삭제 실패 (무시)"
                  sleep 0.3
                fi
              done
          # 2. 인라인 리뷰 코멘트 삭제
          # - 미해결 스레드 중 bot 코멘트만 있는 스레드만 삭제
          # - 사용자 답글이 있는 스레드는 삭제하지 않음 (코드만 덩그러니 남는 문제 방지)
          OWNER=${REPO%/*}
          NAME=${REPO#*/}
          gh api graphql -F owner="$OWNER" -F name="$NAME" -F number=$PR_NUMBER -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(last: 100) {
                    nodes {
                      isResolved
                      comments(first: 50) {
                        nodes {
                          databaseId
                          author {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              }
            }' \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | select([.comments.nodes[].author.login] | all(. == "github-actions[bot]")) | .comments.nodes[].databaseId' \
            | while read comment_id; do
                if [ -n "$comment_id" ]; then
                  echo "🗑️  인라인 코멘트 삭제: $comment_id"
                  gh api -X DELETE "repos/$REPO/pulls/comments/$comment_id" 2>/dev/null || echo "⚠️  삭제 실패 (무시)"
                  sleep 0.3
                fi
              done
          echo "✅ 이전 리뷰 삭제 완료"
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            이 PR을 리뷰하고 코멘트로 작성해주세요.
            
            ## 중요: 리뷰 코멘트 일괄 제출
            
            개별 코멘트를 하나씩 작성하지 마세요. 반드시 모든 리뷰 코멘트를 모아서 GitHub API를 통해 **한 번에** 제출해야 합니다.

            ### 리뷰 절차:
            1. `gh pr diff ${{ github.event.pull_request.number }}`로 변경사항을 확인합니다.
            2. 모든 리뷰 의견을 수집합니다.
            3. 심각한 문제가 없으면 아래 형식으로 **한 번에** 승인합니다:

            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST \
              -f event="APPROVE" \
              -f body="리뷰 요약 내용" \
              --input - <<'EOF'
            {
              "comments": [
                {
                  "path": "파일경로",
                  "line": 라인번호,
                  "body": "코멘트 내용"
                }
              ]
            }
            EOF
            ```

            4. 심각한 문제가 있으면 event를 "REQUEST_CHANGES"로 변경합니다.
            5. 인라인 코멘트가 없으면 comments 배열을 비워서 제출합니다.
            6. 리뷰 완료 후 심각한 문제가 없으면 `gh pr review ${{ github.event.pull_request.number }} --approve -b "LGTM"` 명령으로 승인해주세요.

            ### 주의사항:
            - `gh pr comment`도 사용하지 마세요.
            - 반드시 `gh api`로 리뷰를 한 번에 제출하세요.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh api:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)Bash(gh pr review:*)"
